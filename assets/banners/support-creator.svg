<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 100" width="1200" height="100">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#1e1b4b"/>
      <stop offset="0.5" stop-color="#312e81"/>
      <stop offset="1" stop-color="#1e1b4b"/>
    </linearGradient>
    <pattern id="dots" x="0" y="0" width="22" height="22" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="0.7" fill="#ffffff" opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="1200" height="100" fill="url(#bg)"/>
  <rect width="1200" height="100" fill="url(#dots)"/>

  <g transform="translate(40, 28)">
    <rect width="52" height="44" rx="11" fill="#ef4444"/>
    <polygon points="20,12 20,32 36,22" fill="#ffffff"/>
  </g>

  <text x="110" y="44" font-family="Inter, -apple-system, system-ui, sans-serif" font-size="17" font-weight="700" fill="#ffffff" letter-spacing="-0.3">You're building momentum. Subscribe to keep it going.</text>
  <text x="110" y="70" font-family="Inter, -apple-system, system-ui, sans-serif" font-size="13" font-weight="400" fill="#a5b4fc" letter-spacing="-0.1">New challenges, projects, and deep dives drop regularly - straight to your feed.</text>

  <g transform="translate(1150, 50)">
    <circle r="20" fill="#4338ca" opacity="0.5"/>
    <circle r="20" fill="none" stroke="#a5b4fc" stroke-opacity="0.4" stroke-width="1.5"/>
    <path d="M -6 0 L 6 0 M 1 -5 L 6 0 L 1 5" stroke="#e0e7ff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </g>
</svg>
