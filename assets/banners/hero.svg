<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 320" width="1200" height="320">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1e1b4b"/>
      <stop offset="0.5" stop-color="#312e81"/>
      <stop offset="1" stop-color="#1e293b"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.85" cy="0.2" r="0.6">
      <stop offset="0" stop-color="#6366f1" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#6366f1" stop-opacity="0"/>
      <animate attributeName="cx" values="0.85;0.55;0.85" dur="14s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="0.2;0.4;0.2" dur="14s" repeatCount="indefinite"/>
    </radialGradient>
    <pattern id="dots" x="0" y="0" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="0.9" fill="#ffffff" opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="1200" height="320" fill="url(#bg)"/>
  <rect width="1200" height="320" fill="url(#glow)"/>
  <rect width="1200" height="320" fill="url(#dots)"/>

  <g transform="translate(60, 50)">
    <rect width="190" height="32" rx="16" fill="#ffffff" fill-opacity="0.08" stroke="#ffffff" stroke-opacity="0.18"/>
    <circle cx="20" cy="16" r="4" fill="#10b981">
      <animate attributeName="opacity" values="1;0.45;1" dur="2.4s" repeatCount="indefinite"/>
    </circle>
    <text x="34" y="21" font-family="ui-monospace, 'JetBrains Mono', 'Consolas', monospace" font-size="11" font-weight="600" fill="#e0e7ff" letter-spacing="1.8">STEPHEN | DATA</text>
  </g>

  <text x="60" y="180" font-family="Inter, -apple-system, system-ui, sans-serif" font-size="64" font-weight="800" fill="#ffffff" letter-spacing="-2.5">Data Shorts Library</text>
  <text x="60" y="218" font-family="Inter, -apple-system, system-ui, sans-serif" font-size="20" font-weight="400" fill="#a5b4fc" letter-spacing="-0.3">294 shorts across 11 categories - find your path.</text>

  <text x="1140" y="290" text-anchor="end" font-family="ui-monospace, 'JetBrains Mono', 'Consolas', monospace" font-size="13" font-weight="500" fill="#818cf8" letter-spacing="0.6">@sdw-online</text>

  <g transform="translate(1054, 114)" opacity="0.4">
    <g>
      <rect x="-44" y="-44" width="44" height="44" rx="10" stroke="#a5b4fc" stroke-width="2" fill="none"/>
      <rect x="-22" y="-22" width="44" height="44" rx="10" stroke="#a5b4fc" stroke-width="2" fill="none"/>
      <rect x="0" y="0" width="44" height="44" rx="10" stroke="#a5b4fc" stroke-width="2" fill="none"/>
      <animateTransform attributeName="transform" attributeType="XML" type="rotate" from="0" to="360" dur="60s" repeatCount="indefinite"/>
    </g>
  </g>

  <line x1="60" y1="305" x2="1140" y2="305" stroke="#4338ca" stroke-opacity="0.35" stroke-width="1"/>
</svg>
