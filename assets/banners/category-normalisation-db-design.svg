<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 200" width="1200" height="200">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1e1b4b"/>
      <stop offset="0.6" stop-color="#312e81"/>
      <stop offset="1" stop-color="#1e293b"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.95" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#6366f1" stop-opacity="0.25"/>
      <stop offset="1" stop-color="#6366f1" stop-opacity="0"/>
    </radialGradient>
    <pattern id="dots" x="0" y="0" width="26" height="26" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="0.8" fill="#ffffff" opacity="0.06"/>
    </pattern>
  </defs>
  <rect width="1200" height="200" fill="url(#bg)"/>
  <rect width="1200" height="200" fill="url(#glow)"/>
  <rect width="1200" height="200" fill="url(#dots)"/>

  <g transform="translate(1080, 65)">
    <rect width="70" height="70" rx="14" fill="#ffffff" fill-opacity="0.08" stroke="#a5b4fc" stroke-opacity="0.35" stroke-width="1.5"/>
    <text x="35" y="46" text-anchor="middle" font-family="Inter, sans-serif" font-size="24" font-weight="800" fill="#e0e7ff" letter-spacing="-0.8">DB</text>
  </g>

  <text x="60" y="100" font-family="Inter, -apple-system, system-ui, sans-serif" font-size="44" font-weight="800" fill="#ffffff" letter-spacing="-1.8">Normalisation / DB Design</text>
  <text x="60" y="132" font-family="Inter, sans-serif" font-size="14" font-weight="500" fill="#a5b4fc" letter-spacing="0.4">3 shorts / 13K views</text>

  <line x1="60" y1="175" x2="1060" y2="175" stroke="#4338ca" stroke-opacity="0.35" stroke-width="1"/>
</svg>
